<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Dubble Bet</title>
  <link rel="icon" href="../dubblebet.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- NAVBAR MINI -->
  <header class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo">
        <img src="../dubblebet.png" alt="Dubble Bet" />
        <div class="logo-text">
          <span class="logo-dubble">DUBBLE</span>
          <span class="logo-bet">BET</span>
        </div>
      </a>
    </div>
  </header>

  <!-- AUTH PAGE -->
  <div class="auth-page">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <img src="../dubblebet.png" alt="Dubble Bet" />
        <h1 class="auth-title">Connexion</h1>
        <p class="auth-sub">Accède à tes pronostics IA</p>
      </div>

      <!-- Error message -->
      <div class="auth-error" id="authError">Erreur d'authentification</div>

      <!-- Formulaire -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Adresse email</label>
          <input
            class="form-input" id="email" type="email"
            placeholder="toi@exemple.fr" required autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input
            class="form-input" id="password" type="password"
            placeholder="••••••••" required autocomplete="current-password"
          />
        </div>
        <div style="text-align: right; margin-top: -8px;">
          <a href="#" style="font-size:13px; color: var(--green);">Mot de passe oublié ?</a>
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">
          Se connecter
        </button>
      </form>

      <div class="divider">OU</div>

      <!-- Google OAuth -->
      <button class="btn-google" onclick="handleGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuer avec Google
      </button>

      <p class="auth-footer">
        Pas encore de compte ?
        <a href="register.html">Créer un compte</a>
      </p>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Redirige si déjà connecté (silencieux si Supabase non configuré)
    (async () => {
      try {
        const session = await window.DB.getSession();
        if (session) window.location.href = 'dashboard.html';
      } catch { /* Mode démo */ }
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('loginBtn');
      const error = document.getElementById('authError');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        error.textContent = 'Veuillez remplir tous les champs.';
        error.classList.add('show');
        return;
      }

      btn.textContent = 'Connexion...';
      btn.disabled = true;
      error.classList.remove('show');

      try {
        await window.DB.signIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        // Supabase non configuré → mode démo
        if (!err.message?.includes('Invalid login') && !err.message?.includes('invalid_grant')) {
          console.info('[Mode démo] Supabase non configuré');
          sessionStorage.setItem('db_user', JSON.stringify({
            email,
            plan: 'pro',
            name: email.split('@')[0],
          }));
          btn.textContent = 'Redirection...';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
          return;
        }
        error.textContent = 'Email ou mot de passe incorrect.';
        error.classList.add('show');
        btn.textContent = 'Se connecter';
        btn.disabled = false;
      }
    }

    async function handleGoogleLogin() {
      try {
        await window.DB.signInWithGoogle();
      } catch (err) {
        // Mode démo
        console.info('[Mode démo] Google OAuth non configuré');
        sessionStorage.setItem('db_user', JSON.stringify({ email: 'demo@dubblebet.fr', plan: 'pro', name: 'Demo' }));
        window.location.href = 'dashboard.html';
      }
    }
  </script>
</body>
</html>
